# Pings Supabase daily so free-tier projects are not paused for inactivity.
# Backup to the Vercel Cron at /api/keep-alive (runs at a different hour).
name: Supabase keep-alive

on:
  schedule:
    # Every day at 11:00 UTC (Vercel cron is 12:00 UTC)
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping via Vercel keep-alive endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          KEEP_ALIVE_URL: ${{ secrets.KEEP_ALIVE_URL }}
        run: |
          set -euo pipefail
          URL="${KEEP_ALIVE_URL:-https://voltsolar.learnwithchris.app/api/keep-alive}"

          if [ -z "${CRON_SECRET:-}" ]; then
            echo "Missing CRON_SECRET GitHub secret."
            echo "Add it in GitHub → Settings → Secrets and variables → Actions"
            exit 1
          fi

          STATUS=$(curl -sS -o /tmp/keep-alive.json -w "%{http_code}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Accept: application/json" \
            "$URL")

          echo "Keep-alive HTTP status: ${STATUS}"
          cat /tmp/keep-alive.json || true
          echo

          if [ "$STATUS" != "200" ]; then
            echo "Keep-alive failed. If Supabase is paused, restore it in the dashboard first."
            exit 1
          fi

          echo "Keep-alive OK"
