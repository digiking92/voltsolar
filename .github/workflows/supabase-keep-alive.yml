# Pings Supabase daily so free-tier projects are not paused for inactivity.
# Hits Supabase REST directly (does not go through Cloudflare / the site domain).
name: Supabase keep-alive

on:
  schedule:
    # Every day at 11:00 UTC (Vercel cron is 12:00 UTC)
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "Missing SUPABASE_URL or SUPABASE_ANON_KEY GitHub secrets."
            echo "Add them from your Supabase project settings (URL + anon/publishable key)."
            exit 1
          fi

          URL="${SUPABASE_URL%/}/rest/v1/profiles?select=id&limit=1"
          STATUS=$(curl -sS -o /tmp/supabase-keep-alive.json -w "%{http_code}" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "Accept: application/json" \
            -H "Cache-Control: no-cache" \
            "$URL")

          echo "Supabase HTTP status: ${STATUS}"
          head -c 500 /tmp/supabase-keep-alive.json || true
          echo

          # 2xx/4xx = request reached Supabase (counts as activity).
          if [ "$STATUS" -ge 500 ] || [ "$STATUS" -eq 000 ]; then
            echo "Keep-alive failed. If the project is paused, restore it in the Supabase dashboard."
            exit 1
          fi

          echo "Keep-alive OK"
